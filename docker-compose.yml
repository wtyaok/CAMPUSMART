services:
  mysql:
    image: mysql:8.4
    container_name: campusmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: campusmart
      MYSQL_DATABASE: campusmart
      MYSQL_USER: campusmart
      MYSQL_PASSWORD: campusmart
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  redis:
    image: redis:7.4-alpine
    container_name: campusmart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
