name: Build GitHub Pages Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Publish dist to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf ../campusmart-pages
          git worktree add ../campusmart-pages gh-pages || git worktree add --orphan ../campusmart-pages gh-pages
          find ../campusmart-pages -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R frontend/dist/. ../campusmart-pages/
          touch ../campusmart-pages/.nojekyll
          cd ../campusmart-pages
          git add -A
          git commit -m "Deploy static site to GitHub Pages" || echo "No changes to deploy"
          git push origin HEAD:gh-pages
